<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SANED</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif; background: #04060c; color: #f1f5f9;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    text-align: center;
  }
  .container { max-width: 480px; padding: 40px; }
  .code { font-size: 120px; font-weight: 900; letter-spacing: -4px; color: rgba(255,255,255,0.08); line-height: 1; }
  h1 { font-size: 24px; font-weight: 700; margin: 16px 0 8px; }
  p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 32px; }
  a {
    display: inline-block; padding: 12px 32px; border-radius: 10px;
    background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.3);
    color: #14b8a6; font-size: 13px; font-weight: 600; text-decoration: none;
    transition: all 0.3s;
  }
  a:hover { background: rgba(20,184,166,0.2); border-color: #14b8a6; }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The architecture document you're looking for doesn't exist or has been moved.</p>
  <a href="./">← Back to Architecture Portal</a>
</div>
</body>
</html>
